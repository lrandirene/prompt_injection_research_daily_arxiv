# This is a basic workflow to help you get started with Actions

name: Run Update Paper Links Weekly

# Controls when the workflow will run
on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
  schedule:
    - cron:  "0 8 * * 1"  #Run At 08:00 on Monday
  # Triggers the workflow on push or pull request events but only for the main branch
#   push:
#     branches:
#     - main

env:

  GITHUB_USER_NAME: lrandirene
  GITHUB_USER_EMAIL: 1662871766@qq.com

permissions:
  contents: write
  actions: read
  
  
# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    name: update
    # The type of runner that the job will run on
    runs-on: ubuntu-latest
    
    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Set up Python Env
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          #architecture: 'x64' # optional x64 or x86. Defaults to x64 if not specified
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install arxiv
          pip install requests
          pip install pyyaml
          
      - name: Run daily arxiv 
        run: |
          python daily_arxiv.py --update_paper_links
          
      - name: Push new safety-arxiv-daily.md
        run: |
          git config --global user.name "${{ env.GITHUB_USER_NAME }}"
          git config --global user.email "${{ env.GITHUB_USER_EMAIL }}"
          git add README.md docs/safety-arxiv-daily.json docs/safety-arxiv-daily-web.json docs/safety-arxiv-daily-wechat.json docs/wechat.md
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Github Action Automatic Update AI safety Arxiv Papers"
          git pull --rebase origin main
          git push origin main